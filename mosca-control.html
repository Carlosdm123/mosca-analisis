<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
margin:40px;
}

/* SWITCH */

button{

font-size:20px;
padding:12px 30px;
margin-right:10px;
cursor:pointer;

}

/* PREVIEW */

#preview{

width:960px;
height:540px;

border:1px solid #444;

overflow:hidden;

position:relative;

margin-top:20px;

}

#preview iframe{

position:absolute;

width:1920px;
height:1080px;

border:none;

transform:scale(.5);
transform-origin:top left;

}

</style>

</head>

<body>

<h2>MOSCA ANÁLISIS</h2>

<button onclick="encender()">ON</button>
<button onclick="apagar()">OFF</button>

<button onclick="abrirOverlay()">VER OVERLAY</button>
<button onclick="copiarLink()">COPIAR LINK</button>

<div id="preview">

<iframe src="mosca-overlay.html"></iframe>

</div>

<script>

const ably = new Ably.Realtime({

key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"

});

const channel = ably.channels.get("vmix-mosca");

function encender(){

channel.publish("control",{action:"on"});

}

function apagar(){

channel.publish("control",{action:"off"});

}

function abrirOverlay(){

window.open("mosca-overlay.html");

}

function copiarLink(){

const url=location.origin+location.pathname.replace("mosca-control.html","mosca-overlay.html");

navigator.clipboard.writeText(url);

alert("Link copiado");

}

</script>

</body>
</html>
