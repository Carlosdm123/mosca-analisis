<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

/* PREVIEW */

#preview{
width:960px;
height:540px;
border:1px solid #444;
overflow:hidden;
margin-bottom:30px;
position:relative;
}

#preview iframe{
position:absolute;
width:1920px;
height:1080px;
transform:scale(.5);
transform-origin:top left;
border:none;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:70px;
height:34px;
margin-bottom:20px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
border-radius:34px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#00c853;
}

input:checked + .slider:before{
transform:translateX(36px);
}

/* HORA */

.hora-box{
display:flex;
align-items:center;
gap:10px;
background:#1a1a1a;
padding:12px 16px;
border-radius:8px;
}

.hora-box label{
font-size:14px;
opacity:.7;
}

input[type="time"]{
padding:8px;
font-size:16px;
background:#000;
color:white;
border:1px solid #333;
border-radius:4px;
}

.status{
color:#00e676;
font-size:14px;
min-width:80px;
}

</style>

</head>

<body>

<div id="preview">
<iframe src="mosca-overlay.html"></iframe>
</div>

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<div class="hora-box">
<label>CIERRE:</label>
<input type="time" id="hora" value="16:00">
<span id="status" class="status"></span>
</div>

<script>

/* ========================= */
/*         ABLY              */
/* ========================= */

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"
});

const channel = ably.channels.get("vmix-mosca");

/* ========================= */
/*         ELEMENTOS         */
/* ========================= */

const toggle = document.getElementById("toggle");
const horaInput = document.getElementById("hora");
const status = document.getElementById("status");

/* ========================= */
/*        ON / OFF           */
/* ========================= */

toggle.addEventListener("change",()=>{

channel.publish("control",{
action: toggle.checked ? "on" : "off"
});

});

/* ========================= */
/*     ENVIAR HORA           */
/* ========================= */

function enviarHora(){

const hora = horaInput.value;

channel.publish("control",{
action:"updateHora",
hora:hora
});

/* feedback visual */

status.innerText = "✔ " + hora;

}

/* cambio manual */

horaInput.addEventListener("change", enviarHora);

/* envío automático al cargar */

window.addEventListener("load",()=>{
enviarHora();
});

</script>

</body>
</html>
