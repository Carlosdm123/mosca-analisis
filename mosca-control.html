<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Mosca</title>

<style>

body{
background:#1e1e1e;
color:#e6e6e6;
font-family:sans-serif;
margin:40px;
text-align:center;
}

/* 🔴🟠🟢 indicador conexión */
#status{
position:fixed;
top:15px;
left:15px;
width:12px;
height:12px;
border-radius:50%;
background:red;
transition:background .3s;
}

/* preview */

.preview{
width:854px;
height:480px;
border:4px solid white;
margin:20px auto;
overflow:hidden;
}

iframe{
width:1920px;
height:1080px;
transform:scale(0.444);
transform-origin:top left;
border:none;
}

/* controles */

.panel{
width:400px;
margin:auto;
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

button{
padding:10px;
background:#2a2a2a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#d8823a;
}

/* switch */

.switch{
position:relative;
display:inline-block;
width:50px;
height:26px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
border-radius:34px;
transition:.4s;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.4s;
}

input:checked + .slider{
background:#4caf50;
}

input:checked + .slider:before{
transform:translateX(24px);
}

/* input hora */

input[type="time"]{
padding:8px;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
font-size:16px;

/* 👇 fuerza ícono visible */
color-scheme:dark;
}

</style>
</head>

<body>

<div id="status"></div>

<h2>Control Mosca</h2>

<div class="preview">
<iframe src="mosca-overlay.html"></iframe>
</div>

<div class="panel">

<label>
Activar
<br><br>
<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>
</label>

<label>Hora cierre</label>
<input type="time" id="horaInput">

<button onclick="abrirOverlay()">Abrir overlay</button>
<button onclick="copiarOverlay()">Copiar URL overlay</button>

</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>

const statusDot = document.getElementById("status");

/* 🔌 conexión */
let realtime;
let channel;

function conectar(){

realtime = new Ably.Realtime({
key:"AQUI_VA_TU_KEY",
recover:true
});

channel = realtime.channels.get("mosca");

realtime.connection.on(state => {

if(state.current === "connected"){
statusDot.style.background = "green";
}

else if(state.current === "connecting"){
statusDot.style.background = "orange";
}

else{
statusDot.style.background = "red";
}

});

/* reconexión automática */
realtime.connection.on("disconnected", () => {
setTimeout(conectar, 2000);
});

}

/* iniciar */
conectar();

/* controles */

const toggle = document.getElementById("toggle");
const horaInput = document.getElementById("horaInput");

toggle.addEventListener("change", () => {

channel.publish("control", {
action: toggle.checked ? "on" : "off"
});

});

/* enviar hora */

horaInput.addEventListener("change", () => {

channel.publish("control", {
action:"hora",
hora: horaInput.value
});

});

/* abrir overlay */

function abrirOverlay(){
window.open("mosca-overlay.html", "_blank");
}

/* copiar url */

function copiarOverlay(){

const url = window.location.origin + "/mosca-overlay.html";

navigator.clipboard.writeText(url);

alert("URL copiada");

}

</script>

</body>
</html>
