<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
background:#1e1e1e;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:40px;
}

.preview{
width:854px;
height:480px;
border:4px solid white;
margin:auto;
overflow:hidden;
}

iframe{
width:1920px;
height:1080px;
transform:scale(.444);
transform-origin:top left;
border:none;
}

.switch{

position:relative;
display:inline-block;
width:60px;
height:34px;

}

.switch input{display:none;}

.slider{

position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
border-radius:34px;

}

.slider:before{

content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.4s;

}

input:checked + .slider{

background:#2c8f6b;

}

input:checked + .slider:before{

transform:translateX(26px);

}

</style>

</head>

<body>

<h2>MOSCA ELECCIONES 2026</h2>

<div class="preview">

<iframe src="mosca-overlay.html"></iframe>

</div>

<br>

<label class="switch">

<input type="checkbox" id="toggle">

<span class="slider"></span>

</label>

<script>

const ably=new Ably.Realtime({

key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true

});

const channel=ably.channels.get("vmix-mosca");

const toggle=document.getElementById("toggle");

toggle.addEventListener("change",()=>{

if(toggle.checked){

channel.publish("control",{action:"on"});

}else{

channel.publish("control",{action:"off"});

}

});

</script>

</body>
</html>
