<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{

font-family:sans-serif;
background:#111;
color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:100vh;
margin:0;

}

/* PREVIEW */

#preview{

width:960px;
height:540px;

border:1px solid #444;

overflow:hidden;

position:relative;

margin-bottom:40px;

}

#preview iframe{

position:absolute;

width:1920px;
height:1080px;

border:none;

transform:scale(.5);
transform-origin:top left;

}

/* SWITCH */

.switch{

position:relative;

display:inline-block;

width:70px;
height:34px;

}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{

position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;

background-color:#444;

transition:.3s;

border-radius:34px;

}

.slider:before{

position:absolute;
content:"";

height:26px;
width:26px;

left:4px;
bottom:4px;

background:white;

transition:.3s;

border-radius:50%;

}

input:checked + .slider{

background:#00c853;

}

input:checked + .slider:before{

transform:translateX(36px);

}

/* BOTONES */

.controls{

display:flex;
gap:20px;
align-items:center;

}

button{

font-size:16px;
padding:10px 18px;
cursor:pointer;

}

</style>

</head>

<body>

<div id="preview">

<iframe src="mosca-overlay.html"></iframe>

</div>

<div class="controls">

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<button onclick="abrirOverlay()">Ver Overlay</button>
<button onclick="copiarLink()">Copiar Link</button>

</div>

<script>

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"
});

const channel = ably.channels.get("vmix-mosca");

const toggle=document.getElementById("toggle");

toggle.addEventListener("change",()=>{

if(toggle.checked){

channel.publish("control",{action:"on"});

}else{

channel.publish("control",{action:"off"});

}

});

function abrirOverlay(){

window.open("mosca-overlay.html");

}

function copiarLink(){

const url=location.origin+location.pathname.replace("mosca-control.html","mosca-overlay.html");

navigator.clipboard.writeText(url);

alert("Link copiado");

}

</script>

</body>
</html>
