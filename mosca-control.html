<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

/* 🔵 INDICADOR WEBSOCKET */
#ws-indicator{
position:absolute;
top:20px;
left:20px;
width:12px;
height:12px;
border-radius:50%;
background:red;
}

/* ========================= */

#preview{
width:960px;
height:540px;
border:1px solid #444;
overflow:hidden;
margin-bottom:30px;
position:relative;
}

#preview iframe{
position:absolute;
width:1920px;
height:1080px;
transform:scale(.5);
transform-origin:top left;
border:none;
}

.switch{
width:70px;
height:34px;
position:relative;
margin-bottom:20px;
}

.switch input{
opacity:0;
}

.slider{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
border-radius:34px;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#00c853;
}

input:checked + .slider:before{
transform:translateX(36px);
}

.hora-box{
display:flex;
gap:10px;
align-items:center;
}

/* 🔥 ICONO TIME EN BLANCO */
input[type="time"]{
padding:8px;
background:#000;
color:white;
border:1px solid #333;

/* icono blanco */
color-scheme: dark;
filter: invert(1);
}

.status{
color:#00e676;
}

/* ========================= */
/* BOTONES NUEVOS            */
/* ========================= */

.botones{
margin-top:20px;
display:flex;
gap:10px;
}

.botones button{
padding:10px 14px;
background:#222;
color:white;
border:1px solid #444;
cursor:pointer;
}

.botones button:hover{
background:#333;
}
</style>

</head>

<body>

<div id="ws-indicator"></div>

<div id="preview">
<iframe src="mosca-overlay.html"></iframe>
</div>

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<div>Cierre de votaciones en:</div>

<div class="hora-box">
<input type="time" id="hora" value="16:00">
<span id="status" class="status"></span>
</div>

  <div style="margin-top:15px;">
Reiniciar animación de logos cada (minutos)
</div>

<div class="hora-box">
<select id="loopMin">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>
</div>
  
<!-- 🔥 BOTONES NUEVOS -->
<div class="botones">
<button id="abrirOverlay">Abrir overlay</button>
<button id="copiarOverlay">Copiar URL overlay</button>
</div>

<script>

const overlayURL = window.location.href.replace("mosca-control.html","mosca-overlay.html");

/* ========================= */
/* ABLY + AUTO RECONEXION    */
/* ========================= */

let ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"
});

let channel = ably.channels.get("vmix-mosca");

const indicator = document.getElementById("ws-indicator");

function setIndicator(color){
indicator.style.background = color;
}

ably.connection.on("connected", ()=>{
setIndicator("#00e676"); // verde
});

ably.connection.on("connecting", ()=>{
setIndicator("orange");
});

ably.connection.on("disconnected", ()=>{
setIndicator("red");
});

ably.connection.on("suspended", ()=>{
setIndicator("red");
});

/* ========================= */
/* CONTROLES EXISTENTES      */
/* ========================= */

const toggle = document.getElementById("toggle");
const horaInput = document.getElementById("hora");
const status = document.getElementById("status");

toggle.addEventListener("change",()=>{
channel.publish("control",{
action: toggle.checked ? "on" : "off"
});
});

function enviarHora(){
channel.publish("control",{
action:"updateHora",
hora:horaInput.value
});
status.innerText = "✔ " + horaInput.value;
}

horaInput.addEventListener("change", enviarHora);

window.addEventListener("load", enviarHora);

/* ========================= */
/* BOTONES NUEVOS            */
/* ========================= */

document.getElementById("abrirOverlay").onclick = ()=>{
window.open(overlayURL, "_blank");
};

document.getElementById("copiarOverlay").onclick = ()=>{
navigator.clipboard.writeText(overlayURL);
};

</script>

</body>
</html>
