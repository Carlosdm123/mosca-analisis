<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

/* CONTENEDOR */

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
}

/* TEXTO */

#texto{

width:600px;

text-align:right;

color:#ffffff;

font-size:44px;

font-weight:bold;

text-transform:uppercase;

line-height:1.1;

text-shadow:6px 6px 12px rgba(0,0,0,.8);

filter:blur(20px);

opacity:0;

}

/* LOGO */

#logo{

position:absolute;

top:0;
right:0;

opacity:0;

filter:blur(20px);

}

#logo img{

height:120px; /* logo más pequeño */

}

</style>

</head>

<body>

<div id="mosca">

<div id="texto">
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
</div>

<div id="logo">
<img src="assets/logo1.png">
</div>

</div>

<script>

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");

let activo=false;

/* GUARDAMOS TODOS LOS TIMERS */

let timers=[];

/* LIMPIAR TODOS LOS TIMERS */

function clearTimers(){

timers.forEach(t=>clearTimeout(t));
timers=[];

}

/* RESET VISUAL */

function resetVisual(){

mosca.style.transition="none";

mosca.style.opacity=0;
mosca.style.filter="blur(0)";

texto.style.opacity=0;
texto.style.filter="blur(20px)";

logo.style.opacity=0;
logo.style.filter="blur(20px)";
logo.style.transform="translateX(0)";

}

/* ANIMACIÓN */

function runAnim(){

if(!activo) return;

resetVisual();

mosca.style.opacity=1;

/* TEXTO ENTRA */

texto.style.transition="all 1s ease";

timers.push(setTimeout(()=>{

texto.style.filter="blur(0)";
texto.style.opacity="1";

},50));

/* TEXTO SALE */

timers.push(setTimeout(()=>{

texto.style.opacity="0";
texto.style.filter="blur(20px)";

},15000));

/* LOGO ENTRA */

timers.push(setTimeout(()=>{

logo.style.transition="all 1s ease";

logo.style.opacity="1";
logo.style.filter="blur(0)";

},17000));

/* LOGO SALE */

timers.push(setTimeout(()=>{

logo.style.opacity="0";
logo.style.filter="blur(20px)";
logo.style.transform="translateX(120px)";

},33000));

/* REPETIR EN 4 MIN */

timers.push(setTimeout(()=>{

runAnim();

},240000));

}

/* ENCENDER */

function startMosca(){

if(activo) return;

activo=true;

clearTimers();

runAnim();

}

/* APAGAR */

function stopMosca(){

activo=false;

clearTimers();

/* salida suave */

mosca.style.transition="all .8s ease";

mosca.style.opacity=0;
mosca.style.filter="blur(15px)";

}

/* ABLY */

const ably = new Ably.Realtime({

key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true

});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d=msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

});

</script>

</body>
</html>
