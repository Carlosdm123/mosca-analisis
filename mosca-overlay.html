<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
filter:blur(20px);
transition:all .6s ease;
}

#texto{
width:600px;
text-align:right;
color:#ffffff;
font-size:36px;
font-weight:bold;
text-transform:uppercase;
opacity:0;
filter:blur(20px);
transition:all .8s ease;
line-height:1.05;
text-shadow:6px 6px 12px rgba(0,0,0,.8);
}

#logo{
position:absolute;
top:0;
right:0;
opacity:0;
filter:blur(20px);
display:flex;
flex-direction:column;
align-items:flex-end;
transition:all .8s ease;
}

#logo img{
height:110px;
}

#logoEE{
position:absolute;
top:0;
right:0;
opacity:0;
display:flex;
justify-content:flex-end;
}

.circle-mask{
width:105px;
height:105px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
clip-path:circle(0% at 50% 50%);
transition:clip-path .7s ease, background .4s ease;
}

.circle-mask img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

#ticker{
width:210px;
height:28px;
background:white;
margin-top:6px;
margin-right:16px;
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
align-items:center;
white-space:nowrap;
animation:tickerLoop 12s linear infinite;
margin-left:-6px;
}

.text{
font-size:14px;
font-weight:bold;
color:black;
margin-right:36px;
}

@keyframes tickerLoop{
0%{ transform:translateX(0); }
100%{ transform:translateX(-50%); }
}

</style>

</head>

<body>

<div id="mosca">

    <div id="texto"></div>

    <div id="logo">
        <img src="assets/logo1.png">

        <div id="ticker">
            <div class="ticker-track">
                <span class="text">WWW.ELESPECTADOR.COM</span>
                <span class="text">WWW.ELESPECTADOR.COM</span>
            </div>
        </div>
    </div>

    <div id="logoEE">
        <div class="circle-mask">
            <img src="assets/logoee.png">
        </div>
    </div>

</div>

<script>

/* ELEMENTOS */

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");
const logoEE = document.getElementById("logoEE");

let activo = false;
let horaCierre = "16:00";
let interval = null;
let cierreTsGlobal = null;

let timeouts = [];
let minutosLoop = 0;

/* ========================= */
/* RESET TOTAL               */
/* ========================= */

function resetMosca(){

timeouts.forEach(t=>clearTimeout(t));
timeouts = [];

if(interval){
clearInterval(interval);
interval = null;
}

texto.style.opacity = 0;
texto.style.filter = "blur(20px)";

logo.style.opacity = 0;
logo.style.filter = "blur(20px)";

logoEE.style.opacity = 0;

const mask = logoEE.querySelector(".circle-mask");
mask.style.clipPath = "circle(0% at 50% 50%)";
mask.style.background = "white";

mosca.style.opacity = 0;
mosca.style.filter = "blur(20px)";

}

/* ========================= */
/* CALCULAR CIERRE           */
/* ========================= */

function calcularCierre(){

const now = new Date();

const colombia = new Intl.DateTimeFormat('en-US', {
timeZone: 'America/Bogota',
hour: '2-digit',
minute: '2-digit',
hour12: false
}).format(now);

const [currentH, currentM] = colombia.split(":").map(Number);
const [h, m] = horaCierre.split(":").map(Number);

const nowTs = Date.now();

const currentMinutes = currentH * 60 + currentM;
const cierreMinutes = h * 60 + m;

let diffMinutes = cierreMinutes - currentMinutes;

if(diffMinutes < -1){
diffMinutes += 1440;
}

cierreTsGlobal = nowTs + (diffMinutes * 60 * 1000);

}

/* ========================= */
/* FORMATO TIEMPO            */
/* ========================= */

function formatTime(sec){

sec = Math.max(0, sec);

let h = Math.floor(sec/3600);
let m = Math.floor((sec%3600)/60);
let s = sec%60;

return String(h).padStart(2,"0")+":"+
       String(m).padStart(2,"0")+":"+
       String(s).padStart(2,"0");

}

/* ========================= */
/* TEXTO DINÁMICO            */
/* ========================= */

function updateTexto(){

if(!cierreTsGlobal) return;

const nowTs = Date.now();
let diff = Math.floor((cierreTsGlobal - nowTs)/1000);

if(diff > 0){

texto.innerHTML = `
CIERRE DE VOTACIONES EN:<br>
${formatTime(diff)}
`;

}
else if(diff <= 0 && diff > -60){

texto.innerHTML = `VOTACIONES CERRADAS`;

}
else{

texto.innerHTML = `
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
`;

}

}

/* ========================= */
/* ANIMACIÓN CONTROLADA      */
/* ========================= */

function startMosca(){

resetMosca();
activo = true;
calcularCierre();

mosca.style.opacity = 1;
mosca.style.filter = "blur(0)";

let t = 0;

/* TEXTO */

timeouts.push(setTimeout(()=>{
texto.style.opacity = 1;
texto.style.filter = "blur(0)";
}, t+200));

timeouts.push(setTimeout(()=>{
texto.style.opacity = 0;
texto.style.filter = "blur(20px)";
}, t+20000));

t += 20000;

/* LOGO */

timeouts.push(setTimeout(()=>{
logo.style.opacity = 1;
logo.style.filter = "blur(0)";
}, t+200));

timeouts.push(setTimeout(()=>{
logo.style.opacity = 0;
logo.style.filter = "blur(20px)";
}, t+20000));

t += 20000;

/* LOGO EE */

timeouts.push(setTimeout(()=>{
logoEE.style.opacity = 1;

const mask = logoEE.querySelector(".circle-mask");
mask.style.clipPath = "circle(60% at 50% 50%)";

setTimeout(()=>{
mask.style.background = "transparent";
},400);

}, t+200));

timeouts.push(setTimeout(()=>{
const mask = logoEE.querySelector(".circle-mask");
mask.style.background = "white";
mask.style.clipPath = "circle(0% at 50% 50%)";
}, t+10000));

timeouts.push(setTimeout(()=>{
logoEE.style.opacity = 0;
}, t+10500));

t += 10000;

/* LOOP */

timeouts.push(setTimeout(()=>{

if(!activo) return;

let delay = minutosLoop * 60 * 1000;

timeouts.push(setTimeout(()=>{
if(activo) startMosca();
}, delay));

}, t));

/* CONTADOR */

interval = setInterval(updateTexto,1000);
updateTexto();

}

/* STOP */

function stopMosca(){
activo = false;
resetMosca();
}

/* ========================= */
/* ABLY                      */
/* ========================= */

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"
});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d = msg.data;

/* 🔥 SIEMPRE REINICIO LIMPIO */

if(d.action==="on"){
stopMosca();
setTimeout(()=>startMosca(),50);
}

if(d.action==="off"){
stopMosca();
}

if(d.action==="updateHora"){
horaCierre = d.hora;
calcularCierre();
updateTexto();
}

if(d.action==="updateLoop"){
minutosLoop = parseInt(d.minutos || 0);
}

});

</script>

</body>
</html>
