<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
margin:0;
background:transparent;
overflow:hidden;
font-family:sans-serif;
}

/* CONTENEDOR MOSCA */

#mosca{
position:absolute;
top:60px;
right:80px;
opacity:0;
}

/* TEXTO */

#texto{

position:absolute;
top:0;
right:0;

text-align:right;

color:#ffffff;

font-size:36px; /* más pequeño */

font-weight:bold;

text-transform:uppercase;

line-height:1.2;

text-shadow:6px 6px 12px rgba(0,0,0,.8);

filter:blur(20px);

}

/* LOGO */

#logo{

position:absolute;
top:0;
right:0;

opacity:0;

filter:blur(20px);

}

#logo img{

height:80px;

}

</style>

</head>

<body>

<div id="mosca">

<div id="texto">
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
</div>

<div id="logo">
<img src="assets/logo.png">
</div>

</div>

<script>

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");

let activo=false;
let ciclo=null;

/* BLOQUE ANIMADO */

function runAnim(){

if(!activo) return;

mosca.style.opacity=1;

/* TEXTO ENTRA */

texto.style.transition="all 1.2s";

texto.style.filter="blur(0)";
texto.style.opacity="1";

/* TEXTO SALE */

setTimeout(()=>{

texto.style.opacity="0";
texto.style.filter="blur(20px)";

},15000);

/* LOGO ENTRA */

setTimeout(()=>{

logo.style.transition="all 1.2s";

logo.style.opacity="1";
logo.style.filter="blur(0)";

},17000);

/* LOGO SALE */

setTimeout(()=>{

logo.style.opacity="0";
logo.style.filter="blur(20px)";
logo.style.transform="translateX(120px)";

},33000);

/* REPETIR CADA 4 MINUTOS */

ciclo=setTimeout(runAnim,240000);

}

function startMosca(){

activo=true;

/* reset visual */

mosca.style.filter="blur(0)";
mosca.style.opacity=0;

texto.style.opacity=0;
logo.style.opacity=0;

runAnim();

}

function stopMosca(){

activo=false;

clearTimeout(ciclo);

/* fade + blur */

mosca.style.transition="all .8s";

mosca.style.opacity=0;
mosca.style.filter="blur(15px)";

}

/* ABLY */

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true
});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d=msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

});

</script>

</body>
</html>
