<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<!-- CSS -->
<link rel="stylesheet" href="mosca-style.css">

<!-- ABLY -->
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

/* BASE */

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

/* CONTENEDOR */

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
filter:blur(20px);
}

/* TEXTO */

#texto{
width:600px;
text-align:right;
color:#ffffff;
font-size:36px;
font-weight:bold;
text-transform:uppercase;
line-height:1.05;
text-shadow:6px 6px 12px rgba(0,0,0,.8);
opacity:0;
filter:blur(20px);
}

/* LOGO PRINCIPAL */

#logo{
position:absolute;
top:0;
right:0;
opacity:0;
filter:blur(20px);
display:flex;
flex-direction:column;
align-items:flex-end;
}

#logo img{
height:120px;
}

/* LOGO EE */

#logoEE{
position:absolute;
top:0;
right:0;
opacity:0;
display:flex;
justify-content:flex-end;
}

.circle-mask{
width:90px;
height:90px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
clip-path:circle(0% at 50% 50%);
transition:clip-path .7s ease, background .4s ease;
}

.circle-mask img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* TICKER */

:root{
--ticker-right:16px;
--ticker-width:230px;
--ticker-height:31px;
}

#ticker{
width:var(--ticker-width);
height:var(--ticker-height);
background:white;
margin-top:6px;
margin-right:var(--ticker-right);
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
white-space:nowrap;
animation:tickerLoop 12s linear infinite;
}

.text{
font-size:16px;
font-weight:bold;
color:black;
margin-right:48px;
}

@keyframes tickerLoop{
0%{ transform:translateX(0); }
100%{ transform:translateX(-50%); }
}

</style>

</head>

<body>

<div id="mosca">

    <!-- TEXTO -->
    <div id="texto"></div>

    <!-- LOGO PRINCIPAL + TICKER -->
    <div id="logo">

        <img src="assets/logo1.png">

        <div id="ticker">
            <div class="ticker-track">
                <span class="text">WWW.ELESPECTADOR.COM</span>
                <span class="text">WWW.ELESPECTADOR.COM</span>
            </div>
        </div>

    </div>

    <!-- LOGO EE -->
    <div id="logoEE">
        <div class="circle-mask">
            <img src="assets/logoee.png">
        </div>
    </div>

</div>

<!-- JS -->
<script src="mosca-animation.js"></script>

</body>
</html>
