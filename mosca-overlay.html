<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="mosca-style.css">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>

<body>

<div id="mosca">

<div id="texto"></div>

<div id="logo">
<img src="assets/logo1.png">

<div id="ticker">
  <div class="ticker-track">
    <span class="text">WWW.ELESPECTADOR.COM</span>
    <span class="text">WWW.ELESPECTADOR.COM</span>
  </div>
</div>

</div>

</div>

<script>

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");

let activo = false;
let horaCierre = "16:00";
let interval = null;

/* ========================= */
/*  HORA COLOMBIA CORRECTA   */
/* ========================= */

function getColombiaTime(){

const now = new Date();

const colombiaStr = now.toLocaleString("en-US", {
timeZone: "America/Bogota",
hour12: false
});

return new Date(colombiaStr);

}

/* ========================= */
/*   FECHA DE CIERRE         */
/* ========================= */

function getCierreDate(){

const now = getColombiaTime();

const [h,m] = horaCierre.split(":");

const cierre = new Date(now);

cierre.setHours(parseInt(h));
cierre.setMinutes(parseInt(m));
cierre.setSeconds(0);
cierre.setMilliseconds(0);

return cierre;

}

/* ========================= */
/*   FORMATO TIEMPO          */
/* ========================= */

function formatTime(sec){

sec = Math.max(0, sec);

let h = Math.floor(sec/3600);
let m = Math.floor((sec%3600)/60);
let s = sec%60;

return String(h).padStart(2,"0")+":"+
       String(m).padStart(2,"0")+":"+
       String(s).padStart(2,"0");

}

/* ========================= */
/*     UPDATE TEXTO          */
/* ========================= */

function updateTexto(){

const now = getColombiaTime();
const cierre = getCierreDate();

let diff = Math.floor((cierre - now)/1000);

/* ANTES */

if(diff > 0){

texto.innerHTML = `
CIERRE DE VOTACIONES EN:<br>
${formatTime(diff)}
`;

}

/* 1 MIN DESPUÉS */

else if(diff <= 0 && diff > -60){

texto.innerHTML = `
VOTACIONES CERRADAS
`;

}

/* DESPUÉS */

else{

texto.innerHTML = `
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
`;

}

}

/* ========================= */
/*        ANIMACIÓN          */
/* ========================= */

function startMosca(){

activo = true;

/* TRANSICIONES */

mosca.style.transition="all .6s ease";
texto.style.transition="all .8s ease";
logo.style.transition="all .8s ease";

/* RESET */

texto.style.opacity=0;
texto.style.filter="blur(20px)";

logo.style.opacity=0;
logo.style.filter="blur(20px)";

/* ENTRA CONTENEDOR */

mosca.style.opacity=1;
mosca.style.filter="blur(0)";

/* TEXTO ENTRA */

setTimeout(()=>{
texto.style.opacity=1;
texto.style.filter="blur(0)";
},200);

/* TEXTO SALE (20s) */

setTimeout(()=>{
texto.style.opacity=0;
texto.style.filter="blur(20px)";
},20000);

/* LOGO ENTRA */

setTimeout(()=>{
logo.style.opacity=1;
logo.style.filter="blur(0)";
},21500);

/* LOGO SALE (16s visible) */

setTimeout(()=>{
logo.style.opacity=0;
logo.style.filter="blur(20px)";
},37500);

/* LOOP */

setTimeout(()=>{
if(activo) startMosca();
},60000);

/* CONTADOR */

if(interval) clearInterval(interval);
interval = setInterval(updateTexto,1000);
updateTexto();

}

function stopMosca(){

activo = false;

if(interval) clearInterval(interval);

mosca.style.opacity=0;
mosca.style.filter="blur(15px)";

}

/* ========================= */
/*         ABLY              */
/* ========================= */

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true
});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d = msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

if(d.action==="updateHora"){
horaCierre = d.hora;
updateTexto();
}

});

</script>

</body>
</html>
