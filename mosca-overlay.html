<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
filter:blur(20px);
transition:all .6s ease;
}

#texto{
width:600px;
text-align:right;
color:#ffffff;
font-size:36px;
font-weight:bold;
text-transform:uppercase;
opacity:0;
filter:blur(20px);
transition:all .8s ease;
line-height:1.05;
text-shadow:6px 6px 12px rgba(0,0,0,.8);
}

#logo{
position:absolute;
top:0;
right:0;
opacity:0;
filter:blur(20px);
display:flex;
flex-direction:column;
align-items:flex-end;
transition:all .8s ease;
}

#logo img{
height:110px;
}

#logoEE{
position:absolute;
top:0;
right:0;
opacity:0;
display:flex;
justify-content:flex-end;
}

.circle-mask{
width:105px;
height:105px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
clip-path:circle(0% at 50% 50%);
transition:clip-path .7s ease, background .4s ease;
}

.circle-mask img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

#ticker{
width:210px;
height:28px;
background:white;
margin-top:6px;
margin-right:16px;
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
align-items:center;
white-space:nowrap;
animation:tickerLoop 12s linear infinite;
margin-left:-6px;
}

.text{
font-size:14px;
font-weight:bold;
color:black;
margin-right:36px;
}

@keyframes tickerLoop{
0%{ transform:translateX(0); }
100%{ transform:translateX(-50%); }
}

</style>

</head>

<body>

<div id="mosca">

    <div id="texto"></div>

    <div id="logo">
        <img src="assets/logo1.png">

        <div id="ticker">
            <div class="ticker-track">
                <span class="text">WWW.ELESPECTADOR.COM</span>
                <span class="text">WWW.ELESPECTADOR.COM</span>
            </div>
        </div>
    </div>

    <div id="logoEE">
        <div class="circle-mask">
            <img src="assets/logoee.png">
        </div>
    </div>

</div>

<!-- 🔥 AHORA SOLO UN SCRIPT -->
<script src="mosca-animation.js"></script>

</body>
</html>
