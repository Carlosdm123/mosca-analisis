<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

#mosca{

position:absolute;

top:70px;
right:80px;

width:600px;

opacity:0;

}

#texto{

width:600px;

text-align:right;

color:#ffffff;

font-size:44px;

font-weight:bold;

text-transform:uppercase;

line-height:1.1;

text-shadow:6px 6px 12px rgba(0,0,0,.8);

filter:blur(20px);

}

#logo{

position:absolute;

top:0;
right:0;

opacity:0;

filter:blur(20px);

}

#logo img{

height:150px;   /* antes 170 */

}

</style>

</head>

<body>

<div id="mosca">

<div id="texto">
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
</div>

<div id="logo">
<img src="assets/logo1.png">
</div>

</div>

<script>

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");

let activo=false;
let ciclo=null;

function runAnim(){

if(!activo) return;

mosca.style.opacity=1;

texto.style.transition="all 1s";
texto.style.filter="blur(0)";
texto.style.opacity="1";

setTimeout(()=>{

texto.style.opacity="0";
texto.style.filter="blur(20px)";

},15000);

setTimeout(()=>{

logo.style.transition="all 1s";

logo.style.opacity="1";
logo.style.filter="blur(0)";

},17000);

setTimeout(()=>{

logo.style.opacity="0";
logo.style.filter="blur(20px)";
logo.style.transform="translateX(120px)";

},33000);

ciclo=setTimeout(runAnim,240000);

}

function startMosca(){

if(activo) return;

activo=true;

mosca.style.opacity=0;

texto.style.opacity=0;
logo.style.opacity=0;

runAnim();

}

function stopMosca(){

activo=false;

clearTimeout(ciclo);

mosca.style.transition="all .8s";

mosca.style.opacity=0;
mosca.style.filter="blur(15px)";

}

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true
});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d=msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

});

</script>

</body>
</html>
