<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

/* BODY */

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

/* CONTENEDOR MOSCA */

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
filter:blur(20px);
}

/* TEXTO */

#texto{

width:600px;

text-align:right;

color:#ffffff;

font-size:44px;

font-weight:bold;

text-transform:uppercase;

line-height:1.1;

text-shadow:6px 6px 12px rgba(0,0,0,.8);

opacity:0;
filter:blur(20px);

}

/* BLOQUE LOGO */

#logo{

position:absolute;

top:0;
right:0;

opacity:0;
filter:blur(20px);

display:flex;
flex-direction:column;
align-items:flex-end;

}

/* IMAGEN LOGO */

#logo img{

height:120px;

}

/* TICKER */

#ticker{

width:calc(100% - 20px);

height:60px;

background:white;

margin-top:4px;

margin-right:10px;

overflow:hidden;

display:flex;
align-items:center;

padding:0 3px;

}

/* TEXTO DEL TICKER */

#ticker span{

white-space:nowrap;

font-size:26px;

font-weight:bold;

color:black;

animation:tickerMove 8s linear infinite;

}

/* ANIMACIÓN DEL TICKER */

@keyframes tickerMove{

0%{
transform:translateX(100%);
}

100%{
transform:translateX(-100%);
}

}

</style>

</head>

<body>

<div id="mosca">

<div id="texto">
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
</div>

<div id="logo">

<img src="assets/logo1.png">

<div id="ticker">
<span>WWW.ELESPECTADOR.COM</span>
</div>

</div>

</div>

<script>

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");

let activo=false;
let timers=[];

/* limpiar timers */

function clearTimers(){

timers.forEach(t=>clearTimeout(t));
timers=[];

}

/* reset visual completo */

function resetVisual(){

mosca.style.transition="none";
texto.style.transition="none";
logo.style.transition="none";

mosca.style.opacity=0;
mosca.style.filter="blur(20px)";

texto.style.opacity=0;
texto.style.filter="blur(20px)";

logo.style.opacity=0;
logo.style.filter="blur(20px)";
logo.style.transform="translateX(0)";

}

/* animación */

function runAnim(){

if(!activo) return;

/* entrada desenfocada */

mosca.style.transition="all .8s ease";

mosca.style.opacity=1;
mosca.style.filter="blur(0)";

/* TEXTO ENTRA */

timers.push(setTimeout(()=>{

texto.style.transition="all 1s ease";

texto.style.opacity=1;
texto.style.filter="blur(0)";

},200));

/* TEXTO SALE */

timers.push(setTimeout(()=>{

texto.style.opacity=0;
texto.style.filter="blur(20px)";

},15000));

/* LOGO ENTRA */

timers.push(setTimeout(()=>{

logo.style.transition="all 1s ease";

logo.style.opacity=1;
logo.style.filter="blur(0)";

},17000));

/* LOGO SALE */

timers.push(setTimeout(()=>{

logo.style.opacity=0;
logo.style.filter="blur(20px)";
logo.style.transform="translateX(120px)";

},33000));

/* repetir ciclo */

timers.push(setTimeout(()=>{

runAnim();

},240000));

}

/* ON */

function startMosca(){

activo=true;

clearTimers();

resetVisual();

setTimeout(()=>{

runAnim();

},50);

}

/* OFF */

function stopMosca(){

activo=false;

clearTimers();

mosca.style.transition="all .8s ease";

mosca.style.opacity=0;
mosca.style.filter="blur(15px)";

}

/* ABLY */

const ably = new Ably.Realtime({

key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true

});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d=msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

});

</script>

</body>
</html>
