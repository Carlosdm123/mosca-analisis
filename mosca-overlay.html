<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

/* ========================= */
/* BASE                      */
/* ========================= */

body{
margin:0;
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

/* ========================= */
/* CONTENEDOR               */
/* ========================= */

#mosca{
position:absolute;
top:70px;
right:80px;
width:600px;
opacity:0;
filter:blur(20px);
transition:all .6s ease;
}

/* ========================= */
/* TEXTO                     */
/* ========================= */

#texto{
width:600px;
text-align:right;
color:#ffffff;
font-size:36px;
font-weight:bold;
text-transform:uppercase;

opacity:0;
filter:blur(20px);

transition:all .8s ease;

text-shadow:6px 6px 12px rgba(0,0,0,.8);
}

/* ========================= */
/* LOGO PRINCIPAL            */
/* ========================= */

#logo{
position:absolute;
top:0;
right:0;
opacity:0;
filter:blur(20px);
display:flex;
flex-direction:column;
align-items:flex-end;
transition:all .8s ease;
}

#logo img{
height:120px;
}

/* ========================= */
/* LOGO EE (CIRCULAR)        */
/* ========================= */

#logoEE{
position:absolute;
top:0;
right:0;
opacity:0;
display:flex;
justify-content:flex-end;
}

.circle-mask{
width:90px;
height:90px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;

clip-path:circle(0% at 50% 50%);
transition:clip-path .7s ease, background .4s ease;
}

.circle-mask img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* ========================= */
/* TICKER                    */
/* ========================= */

#ticker{
width:230px;
height:31px;
background:white;
margin-top:6px;
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
white-space:nowrap;
animation:tickerLoop 12s linear infinite;
}

.text{
font-size:16px;
font-weight:bold;
color:black;
margin-right:48px;
}

@keyframes tickerLoop{
0%{ transform:translateX(0); }
100%{ transform:translateX(-50%); }
}

</style>

</head>

<body>

<div id="mosca">

    <div id="texto"></div>

    <div id="logo">
        <img src="assets/logo1.png">

        <div id="ticker">
            <div class="ticker-track">
                <span class="text">WWW.ELESPECTADOR.COM</span>
                <span class="text">WWW.ELESPECTADOR.COM</span>
            </div>
        </div>
    </div>

    <div id="logoEE">
        <div class="circle-mask">
            <img src="assets/logoee.png">
        </div>
    </div>

</div>

<script>

/* ========================= */
/* ELEMENTOS                 */
/* ========================= */

const mosca = document.getElementById("mosca");
const texto = document.getElementById("texto");
const logo = document.getElementById("logo");
const logoEE = document.getElementById("logoEE");
const mask = logoEE.querySelector(".circle-mask");

let activo = false;
let horaCierre = "16:00";
let interval = null;
let cierreTsGlobal = null;

/* ========================= */
/* CALCULAR CIERRE           */
/* ========================= */

function calcularCierre(){

const now = new Date();

const colombia = new Intl.DateTimeFormat('en-US', {
timeZone: 'America/Bogota',
hour: '2-digit',
minute: '2-digit',
hour12: false
}).format(now);

const [currentH, currentM] = colombia.split(":").map(Number);
const [h, m] = horaCierre.split(":").map(Number);

const nowTs = Date.now();

const currentMinutes = currentH * 60 + currentM;
const cierreMinutes = h * 60 + m;

let diffMinutes = cierreMinutes - currentMinutes;

if(diffMinutes < -1){
diffMinutes += 1440;
}

cierreTsGlobal = nowTs + (diffMinutes * 60 * 1000);

}

/* ========================= */
/* FORMATO TIEMPO            */
/* ========================= */

function formatTime(sec){

sec = Math.max(0, sec);

let h = Math.floor(sec/3600);
let m = Math.floor((sec%3600)/60);
let s = sec%60;

return String(h).padStart(2,"0")+":"+
       String(m).padStart(2,"0")+":"+
       String(s).padStart(2,"0");

}

/* ========================= */
/* TEXTO DINÁMICO            */
/* ========================= */

function updateTexto(){

if(!cierreTsGlobal) return;

const nowTs = Date.now();
let diff = Math.floor((cierreTsGlobal - nowTs)/1000);

if(diff > 0){

texto.innerHTML = `
CIERRE DE VOTACIONES EN:<br>
${formatTime(diff)}
`;

}
else if(diff <= 0 && diff > -60){

texto.innerHTML = `VOTACIONES CERRADAS`;

}
else{

texto.innerHTML = `
ANÁLISIS DE RESULTADOS<br>
ELECTORALES 2026
`;

}

}

/* ========================= */
/* ANIMACIÓN                 */
/* ========================= */

function startMosca(){

activo = true;
calcularCierre();

/* RESET */

texto.style.opacity = 0;
texto.style.filter = "blur(20px)";

logo.style.opacity = 0;
logo.style.filter = "blur(20px)";

logoEE.style.opacity = 0;
mask.style.clipPath = "circle(0%)";
mask.style.background = "white";

/* CONTENEDOR */

mosca.style.opacity = 1;
mosca.style.filter = "blur(0)";

/* TEXTO */

setTimeout(()=>{
texto.style.opacity = 1;
texto.style.filter = "blur(0)";
},200);

setTimeout(()=>{
texto.style.opacity = 0;
texto.style.filter = "blur(20px)";
},20000);

/* LOGO */

setTimeout(()=>{
logo.style.opacity = 1;
logo.style.filter = "blur(0)";
},21500);

setTimeout(()=>{
logo.style.opacity = 0;
logo.style.filter = "blur(20px)";
},37500);

/* LOGO EE */

setTimeout(()=>{
logoEE.style.opacity = 1;
mask.style.clipPath = "circle(60%)";

setTimeout(()=>{
mask.style.background = "transparent";
},400);

},39000);

setTimeout(()=>{
mask.style.background = "white";
mask.style.clipPath = "circle(0%)";
},55000);

setTimeout(()=>{
logoEE.style.opacity = 0;
},56000);

/* LOOP */

setTimeout(()=>{
if(activo) startMosca();
},65000);

/* CONTADOR */

if(interval) clearInterval(interval);
interval = setInterval(updateTexto,1000);
updateTexto();

}

/* STOP */

function stopMosca(){

activo = false;

if(interval) clearInterval(interval);

mosca.style.opacity = 0;
mosca.style.filter = "blur(15px)";

}

/* ========================= */
/* ABLY                      */
/* ========================= */

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4"
});

const channel = ably.channels.get("vmix-mosca");

channel.subscribe("control",(msg)=>{

const d = msg.data;

if(d.action==="on") startMosca();
if(d.action==="off") stopMosca();

if(d.action==="updateHora"){
horaCierre = d.hora;
calcularCierre();
updateTexto();
}

});

</script>

</body>
</html>
